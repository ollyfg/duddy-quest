name: GUT Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GODOT_VERSION: "4.6.1"
      GODOT_CHANNEL: "stable"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Godot ${{ env.GODOT_VERSION }}
        run: |
          FILENAME="Godot_v${GODOT_VERSION}-${GODOT_CHANNEL}_linux.x86_64"
          URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_CHANNEL}/${FILENAME}.zip"
          wget -q "$URL" -O /tmp/godot.zip
          unzip -q /tmp/godot.zip -d /tmp/godot
          mv "/tmp/godot/${FILENAME}" tools/godot4
          chmod +x tools/godot4

      - name: First-time import (generate UID cache)
        run: |
          tools/godot4 --headless --editor --quit --path . 2>&1 | tail -5 || true

      - name: Run GUT tests
        run: bash tools/run_tests.sh
