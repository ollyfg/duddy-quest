name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main

# Required permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GODOT_VERSION: "4.6.1"
      GODOT_CHANNEL: "stable"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install Godot ${{ env.GODOT_VERSION }}
        run: |
          FILENAME="Godot_v${GODOT_VERSION}-${GODOT_CHANNEL}_linux.x86_64"
          URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_CHANNEL}/${FILENAME}.zip"
          wget -q "$URL" -O /tmp/godot.zip
          unzip -q /tmp/godot.zip -d /tmp/godot
          sudo mv "/tmp/godot/${FILENAME}" /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          godot --version

      - name: Install Godot export templates
        run: |
          TEMPLATE_DIR="$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_CHANNEL}"
          mkdir -p "$TEMPLATE_DIR"
          URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_CHANNEL}/Godot_v${GODOT_VERSION}-${GODOT_CHANNEL}_export_templates.tpz"
          wget -q "$URL" -O /tmp/templates.tpz
          unzip -q /tmp/templates.tpz -d /tmp/templates_extracted
          mv /tmp/templates_extracted/templates/* "$TEMPLATE_DIR/"

      - name: Export project for Web
        run: |
          mkdir -p build/web
          godot --headless --export-release "Web" build/web/index.html

      # GitHub Pages does not send the Cross-Origin-Opener-Policy and
      # Cross-Origin-Embedder-Policy headers required by SharedArrayBuffer
      # (used by Godot's threading model).  The coi-serviceworker shim injects
      # these headers via a Service Worker so the game runs correctly.
      - name: Add coi-serviceworker for SharedArrayBuffer support
        run: |
          wget -q "https://raw.githubusercontent.com/gzuidhof/coi-serviceworker/master/coi-serviceworker.js" \
            -O build/web/coi-serviceworker.js
          sed -i 's|</head>|<script src="coi-serviceworker.js"></script>\n</head>|' build/web/index.html

      # Prevent browsers from serving stale cached versions of the game after a
      # new deployment.  Two complementary techniques are used:
      #
      # 1. HTTP-equivalent meta tags tell browsers (and some CDN layers) not to
      #    store index.html in their cache at all.
      #
      # 2. A version query string (?v=<git-sha>) is appended to the exported
      #    asset URLs in index.html and inside the Godot JS loader.  Because the
      #    URL changes on every commit, browsers treat each deployment as a
      #    brand-new resource and bypass their cache even if the filename is the
      #    same.  The filenames are derived from the export path in
      #    export_presets.cfg (build/web/index.html → stem "index").
      - name: Add cache-busting
        run: |
          GIT_SHA=$(git rev-parse --short HEAD)

          # 1. Inject no-cache meta tags immediately before </head>
          sed -i 's|</head>|    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">|' build/web/index.html
          sed -i 's|    <meta http-equiv="Cache-Control".*|&\n    <meta http-equiv="Pragma" content="no-cache">|' build/web/index.html
          sed -i 's|    <meta http-equiv="Pragma".*|&\n    <meta http-equiv="Expires" content="0">\n</head>|' build/web/index.html

          # 2. Version-bust specific Godot asset references in index.html
          sed -i "s|index\.js\"|index.js?v=${GIT_SHA}\"|g" build/web/index.html
          sed -i "s|index\.wasm\"|index.wasm?v=${GIT_SHA}\"|g" build/web/index.html

          # 3. Version-bust .wasm and .pck fetch URLs inside the Godot JS loader
          if [ -f build/web/index.js ]; then
            sed -i "s|\"index\.wasm\"|\"index.wasm?v=${GIT_SHA}\"|g" build/web/index.js
            sed -i "s|\"index\.pck\"|\"index.pck?v=${GIT_SHA}\"|g" build/web/index.js
          fi

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
