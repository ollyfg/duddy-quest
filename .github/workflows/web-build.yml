name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main

# Required permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GODOT_VERSION: "4.6.1"
      GODOT_CHANNEL: "stable"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install Godot ${{ env.GODOT_VERSION }}
        run: |
          FILENAME="Godot_v${GODOT_VERSION}-${GODOT_CHANNEL}_linux.x86_64"
          URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_CHANNEL}/${FILENAME}.zip"
          wget -q "$URL" -O /tmp/godot.zip
          unzip -q /tmp/godot.zip -d /tmp/godot
          sudo mv "/tmp/godot/${FILENAME}" /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          godot --version

      - name: Install Godot export templates
        run: |
          TEMPLATE_DIR="$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_CHANNEL}"
          mkdir -p "$TEMPLATE_DIR"
          URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_CHANNEL}/Godot_v${GODOT_VERSION}-${GODOT_CHANNEL}_export_templates.tpz"
          wget -q "$URL" -O /tmp/templates.tpz
          unzip -q /tmp/templates.tpz -d /tmp/templates_extracted
          mv /tmp/templates_extracted/templates/* "$TEMPLATE_DIR/"

      - name: Export project for Web
        run: |
          mkdir -p build/web
          godot --headless --export-release "Web" build/web/index.html

      # GitHub Pages does not send the Cross-Origin-Opener-Policy and
      # Cross-Origin-Embedder-Policy headers required by SharedArrayBuffer
      # (used by Godot's threading model).  The coi-serviceworker shim injects
      # these headers via a Service Worker so the game runs correctly.
      - name: Add coi-serviceworker for SharedArrayBuffer support
        run: |
          wget -q "https://raw.githubusercontent.com/gzuidhof/coi-serviceworker/master/coi-serviceworker.js" \
            -O build/web/coi-serviceworker.js
          sed -i 's|</head>|<script src="coi-serviceworker.js"></script>\n</head>|' build/web/index.html

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
