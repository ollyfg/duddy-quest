name: Check grid alignment

# Runs on every pull request targeting main.  Fails if any room scene contains
# a gameplay node whose position is not on the 16-px grid, or an obstacle
# CollisionShape2D whose RectangleShape2D dimensions are not multiples of 16.

on:
  pull_request:
    branches:
      - main

jobs:
  check-alignment:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Run grid-alignment check
        run: python3 tools/check_alignment.py
